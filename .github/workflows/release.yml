name: Release gem (RubyGems)

# Pure-Ruby gem: no native extension, so NO cross-compile matrix — build the one
# source gem and push it via Trusted Publishing (OIDC — no API key secret), on a
# version tag.
#
# ONE-TIME setup on rubygems.org BEFORE the first tag (the gem doesn't exist yet
# — register a *pending* publisher under Trusted Publishers):
#   RubyGem: bridgetown-sasso | Owner+Repo: momiji-rs/bridgetown-sasso
#   Workflow: release.yml | Environment: release
# The pending-publisher RubyGem name MUST be `bridgetown-sasso` (the gem), not
# the repo path. Also add a "release" environment in repo Settings → Environments.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # exact MAJOR.MINOR.PATCH (no prerelease suffix)

permissions: {}

jobs:
  publish:
    name: push to RubyGems (OIDC)
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write   # mint a short-lived RubyGems token via OIDC (no secret)
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - name: verify gem version == tag
        run: |
          v=$(ruby -Ilib -r bridgetown-sasso/version -e 'print BridgetownSasso::VERSION')
          if [ "v${v}" != "${GITHUB_REF_NAME}" ]; then
            echo "lib/bridgetown-sasso/version.rb (${v}) != tag (${GITHUB_REF_NAME})"; exit 1
          fi
      - name: build gem
        run: |
          v=$(ruby -Ilib -r bridgetown-sasso/version -e 'print BridgetownSasso::VERSION')
          mkdir -p pkg
          gem build bridgetown-sasso.gemspec -o "pkg/bridgetown-sasso-${v}.gem"
      # OIDC token exchange — no GEM_HOST_API_KEY secret.
      # NB: this action publishes only `vMAJOR.MINOR.PATCH` tags (no moving @v1).
      - uses: rubygems/configure-rubygems-credentials@v2.1.0
      - name: gem push
        run: |
          v=$(ruby -Ilib -r bridgetown-sasso/version -e 'print BridgetownSasso::VERSION')
          gem push "pkg/bridgetown-sasso-${v}.gem"
