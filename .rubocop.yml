require: rubocop-bridgetown

inherit_gem:
  rubocop-bridgetown: .rubocop.yml

AllCops:
  TargetRubyVersion: 3.1
  Exclude:
    - "*.gemspec"
    - Gemfile
    - Gemfile.lock
    - Rakefile
    - CHANGELOG.md
    - CODE_OF_CONDUCT.md
    - LICENSE
    - README.md
    - bridgetown.automation.rb
    - test/fixtures/**/*
    - vendor/**/*
